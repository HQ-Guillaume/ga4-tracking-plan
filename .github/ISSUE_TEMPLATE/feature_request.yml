name: Feature request
description: Suggest an improvement to the skill package.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What tracking-plan workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: ga4_docs
    attributes:
      label: GA4 documentation
      description: Link to relevant official GA4 docs if the request concerns standard events or parameters.
    validations:
      required: false
